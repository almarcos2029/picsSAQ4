    <script>
      document.getElementById("checkoutForm").addEventListener("submit", function (e) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let formatted = cart.map(item => ({
    prod_name: item.name || "Item",
    prod_price: Number(String(item.price).replace(/[^\d]/g, "")) || 0
  }));

  document.getElementById("cust_order").value = JSON.stringify(formatted);
});

      function getPrice(value) {
        if (typeof value === "number") return value;
        if (!value) return 0;
        const cleaned = String(value).replace(/[^\d]/g, "");
        return Number(cleaned) || 0;
      }

function loadCart() {
  const container = document.getElementById("lstbx");
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  container.innerHTML = `
    <h1 style="text-align:center;">
      Cart <i class="fa-solid fa-cart-shopping"></i>
    </h1>
    <div id="cart-items"></div>
    <h4 id="total">Total Price: ₱0</h4>
    <hr>
  `;
  const itemsContainer = document.getElementById("cart-items");
  if (cart.length === 0) {
    itemsContainer.innerHTML = "<p>You gonna buy anything or...?</p>";
    return;
  }
  let total = 0;
  cart.forEach((item, index) => {
    const price = getPrice(item.price);
    total += price;
    const div = document.createElement("div");
    div.innerHTML = `
      <h5>${item.name || "Item"}</h5>
      <p>₱${price.toLocaleString()}</p>
      <button onclick="removeItem(${index})"
        class="btn" id="srchbttnordr">
        Remove
      </button>
      <hr>
    `;
    itemsContainer.appendChild(div);
  });

  document.getElementById("total").innerText =
    "Total Price: ₱" + total.toLocaleString();
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

loadCart();
